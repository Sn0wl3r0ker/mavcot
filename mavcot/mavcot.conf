# mavcot.conf
# Default proxy configuration
[mavlink]
transport: udpin
address: 0.0.0.0
port: 14445

[cot]
# multicast
# address: 239.2.3.1
# port: 6969
# FreeTAKServer UDP ingest (adjust address to your FTS host)
# transport: udp
# address: 192.168.88.131
# port: 8087
# output_rate_hz: 1
# uid: UAV_NYCU
# type: a-f-A-M-F-Q

# FreeTAKServer mTLS profile (ROS bridge style, default port 8089)
transport: tls
address: 192.168.88.131
port: 8089
client_cert: certs/client.crt
client_key: certs/client.key
ca_cert: certs/ca.crt
verify_server: true
# server_hostname:
framing: newline
reconnect_sec: 3
